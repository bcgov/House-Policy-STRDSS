name: "STRDSS Server"

on:
  workflow_dispatch:
  push:
    branches:
      - emerald
    paths-ignore:
      - database/**
      - package.json
      - package-lock.json
      - CHANGELOG.md
      - .conventional-changelog.mjs
      - .release-it.json
      - postman/**
      - localdb/**
      - postgres/**
      - crunchydb/**

jobs:
  build-backend:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
 
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.400'
 
      - uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget
 
      - name: Setup Tools
        uses: ./.github/actions/setup-tools
 
      - name: Build backend
        run: |
          pwd
          dotnet build ./server/server.sln
 
      - name: Test backend
        run: dotnet test ./server/server.sln --no-build
 
    #  # SonarQube integration for backend
    #   - name: SonarQube Scan Backend
    #     uses: sonarsource/sonarcloud-github-action@v2
    #     env:
    #       SONAR_HOST_URL: https://sonarcloud.io
    #       SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_TEST }}
 
 
 
  docker-build-backend:
    needs: [build-backend]
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
 
    steps:
    - uses: actions/checkout@v4
 
    - name: Setup Tools
      uses: ./.github/actions/setup-tools
 
    - name: Build Docker image
      run: cd server && docker build -t strdss-backend -f Dockerfile .
 
    - name: Tag Docker image
      run: docker tag strdss-backend artifacts.developer.gov.bc.ca/sf4a-strdss/server:2.0
 
    - name: Push Docker image to Artifactory
      run: |
        docker login artifacts.developer.gov.bc.ca -u ${{ secrets.JFROG_USERNAME }} -p ${{ secrets.JFROG_PASSWORD }}
        docker push artifacts.developer.gov.bc.ca/sf4a-strdss/server:2.0
 
 
  


